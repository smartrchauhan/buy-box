services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: buybox
      POSTGRES_PASSWORD: buybox_local_only
      POSTGRES_DB: buybox
    ports:
      - "5432:5432"
    volumes:
      - buybox_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buybox"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: sqs,secretsmanager
      DEBUG: 0
    ports:
      - "4566:4566"
    volumes:
      - buybox_localstack_data:/var/lib/localstack

volumes:
  buybox_postgres_data:
  buybox_localstack_data:
